#:schema node_modules/wrangler/config-schema.json
name = "cf-create-worker"
main = "src/index.js"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2024-09-24"

[[d1_databases]]
binding = "DB" # available in your Worker on env.DB
database_name = "twikoo"
database_id = "e1e79a4e-c08f-4b09-9163-62df9b0fea5a"

[[r2_buckets]]
binding = "R2"
bucket_name = "twikoo"

[vars]
R2_PUBLIC_URL = "https://deepseekwiki.win"

[dev]
port = 5000
